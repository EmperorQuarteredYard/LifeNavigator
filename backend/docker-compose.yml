version: '3.8'

services:
  web:
    build:
      context: .
    ports:
      - "5083:5083"               # 映射宿主机端口到容器端口（根据你的应用端口调整）
    environment:
      - DB_HOST=mysql              # MySQL 服务名
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=CCEl8shKS1Byu0QFbSwy0   # 请修改为强密码
      - DB_NAME=LifeNavigatorData               # 数据库名
      - JWT_ACCESS_SECRET=S4f7XnZh5zha9dLFbbjj1TpT77LBft8aDc4DOj34hluLaEZaG8pzERXKuZQQMqCTEZlLiZgtv_RAIUXvyzKFkjjhbA5Nr9yRV_JuibeIl9jChwzC7Of8FGg7HHXdiTTf
      - JWT_REFRESH_SECRET=yONJ7qBqz9mDGSufSQZs30bT5h2lumRBtaK_M8XD766NkSU73xK8uWeat1MfpUmWPTFo_Xrg7ybKHConVxYcyfOrOgboWdrhBdnYfBe6bUoxLmed9OBCKddymfgVU8t8
      - JWT_ISSUER=LiuShuangLifeNavigatorDemo
      - JWT_ACCESS_TTL=7200000000000      #2小时
      - JWT_REFRESH_TTL=259200000000000   #3天
    depends_on:
      - mysql
    networks:
      - app-network
    # 如果应用启动需要等待 MySQL 就绪，可以使用 wait-for-it 脚本（见下文）

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"                # 可选：暴露到宿主机方便调试
    environment:
      MYSQL_ROOT_PASSWORD: CCEl8shKS1Byu0QFbSwy0   # root 密码
      MYSQL_DATABASE: LifeNavigatorData                 # 数据库
      MYSQL_USER: user                       # 普通用户
      MYSQL_PASSWORD: xPBPH4UzbQ           # 普通用户密码
    volumes:
      - mysql-data:/var/lib/mysql            # 持久化数据
    networks:
      - app-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: